<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Debug Battle Arena</title>
    <style>
        body {
            font-family: 'Courier New', monospace;
            padding: 20px;
            background: #f0f0f0;
        }
        .test-section {
            background: white;
            border: 2px solid #000;
            border-radius: 8px;
            padding: 20px;
            margin: 20px 0;
            box-shadow: 2px 2px 0 #000;
        }
        .test-btn {
            background: #ffcc00;
            border: 2px solid #000;
            padding: 10px 20px;
            margin: 10px 5px;
            font-weight: bold;
            cursor: pointer;
            border-radius: 4px;
        }
        .test-btn:hover {
            background: #ff9900;
        }
        .result {
            margin: 10px 0;
            padding: 10px;
            background: #f8f8f8;
            border: 1px solid #000;
            border-radius: 4px;
        }
        .success { background: #d4edda; border-color: #28a745; }
        .error { background: #f8d7da; border-color: #dc3545; }
    </style>
</head>
<body>
    <h1>🔧 DEBUG BATTLE ARENA 🔧</h1>
    
    <div class="test-section">
        <h2>Teste de Comunicação com Servidor</h2>
        <button class="test-btn" onclick="testStartBattle()">Testar Iniciar Batalha</button>
        <button class="test-btn" onclick="testGetState()">Testar Obter Estado</button>
        <button class="test-btn" onclick="testPlayerAction()">Testar Ação do Jogador</button>
        <button class="test-btn" onclick="testReset()">Testar Reset</button>
        <div id="testResult" class="result"></div>
    </div>
    
    <div class="test-section">
        <h2>Status do Servidor</h2>
        <div id="serverStatus" class="result">Verificando...</div>
    </div>
    
    <div class="test-section">
        <h2>Links Úteis</h2>
        <a href="http://localhost:8000" target="_blank">🎮 Abrir Jogo</a><br><br>
        <a href="http://localhost:8000/test.html" target="_blank">🧪 Página de Teste</a>
    </div>

    <script>
        function showResult(message, isSuccess = true) {
            const resultDiv = document.getElementById('testResult');
            resultDiv.className = `result ${isSuccess ? 'success' : 'error'}`;
            resultDiv.innerHTML = `<strong>${isSuccess ? '✅ SUCESSO' : '❌ ERRO'}:</strong><br>${message}`;
        }
        
        function testStartBattle() {
            showResult('Enviando requisição de iniciar batalha...', false);
            
            fetch('http://localhost:8000', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    action: 'start_battle',
                    p1_name: 'Debug Player 1',
                    p2_name: 'Debug Player 2',
                    p1_char: 'Sukuna',
                    p2_char: 'Goku'
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Start Battle Response:', data);
                if (data.status === 'started') {
                    showResult('Batalha iniciada com sucesso! Servidor respondeu corretamente.');
                } else {
                    showResult(`Erro: ${data.message || 'Resposta inesperada'}`, false);
                }
            })
            .catch(error => {
                console.error('Start Battle Error:', error);
                showResult(`Erro de comunicação: ${error.message}`, false);
            });
        }
        
        function testGetState() {
            showResult('Enviando requisição de obter estado...', false);
            
            fetch('http://localhost:8000', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    action: 'getBattleState'
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Get State Response:', data);
                if (data.success) {
                    showResult('Estado obtido com sucesso! Dados recebidos: ' + JSON.stringify(data.data, null, 2));
                } else {
                    showResult(`Erro: ${data.message || 'Nenhuma batalha ativa'}`, false);
                }
            })
            .catch(error => {
                console.error('Get State Error:', error);
                showResult(`Erro de comunicação: ${error.message}`, false);
            });
        }
        
        function testPlayerAction() {
            showResult('Enviando requisição de ação do jogador...', false);
            
            fetch('http://localhost:8000', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    action: 'player_action',
                    player: 1,
                    move: 'attack'
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Player Action Response:', data);
                if (data.success) {
                    showResult('Ação executada com sucesso! Dados: ' + JSON.stringify(data.data, null, 2));
                } else {
                    showResult(`Erro: ${data.message || 'Ação não pode ser executada'}`, false);
                }
            })
            .catch(error => {
                console.error('Player Action Error:', error);
                showResult(`Erro de comunicação: ${error.message}`, false);
            });
        }
        
        function testReset() {
            showResult('Enviando requisição de reset...', false);
            
            fetch('http://localhost:8000', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/x-www-form-urlencoded',
                },
                body: new URLSearchParams({
                    action: 'reset'
                })
            })
            .then(response => response.json())
            .then(data => {
                console.log('Reset Response:', data);
                if (data.status === 'reset') {
                    showResult('Reset executado com sucesso!');
                } else {
                    showResult(`Erro: ${data.message || 'Reset não pode ser executado'}`, false);
                }
            })
            .catch(error => {
                console.error('Reset Error:', error);
                showResult(`Erro de comunicação: ${error.message}`, false);
            });
        }
        
        function checkServerStatus() {
            fetch('http://localhost:8000')
                .then(response => {
                    if (response.ok) {
                        document.getElementById('serverStatus').innerHTML = 
                            '<span class="success">✅ SERVIDOR ONLINE - HTTP ' + response.status + '</span>';
                    } else {
                        document.getElementById('serverStatus').innerHTML = 
                            '<span class="error">❌ SERVIDOR COM PROBLEMAS - HTTP ' + response.status + '</span>';
                    }
                })
                .catch(error => {
                    document.getElementById('serverStatus').innerHTML = 
                        '<span class="error">❌ SERVIDOR OFFLINE - ' + error.message + '</span>';
                });
        }
        
        // Verifica status do servidor ao carregar
        checkServerStatus();
        
        // Atualiza status a cada 5 segundos
        setInterval(checkServerStatus, 5000);
    </script>
</body>
</html>
